<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffilk Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0f172a',
                        cardbg: '#1e293b',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transition: all 0.3s ease;
        }
        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4);
        }
    </style>
</head>
<body class="min-h-screen p-6">
    <div id="app" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                Traffilk Dashboard
            </h1>
            <button @click="showAddModal = true" class="btn-primary px-4 py-2 rounded-lg font-medium text-white flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Add Node
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Sidebar with Nodes -->
            <div class="col-span-1 glass-card p-4 h-[calc(100vh-120px)] overflow-y-auto">
                <h2 class="text-xl font-semibold mb-4 text-slate-200">Servers</h2>
                <div v-if="nodes.length === 0" class="text-slate-400 text-sm text-center py-4">
                    No servers added yet.
                </div>
                <div v-for="node in nodes" :key="node.id" 
                     @click="selectNode(node)"
                     :class="['p-4 rounded-xl cursor-pointer transition-all mb-3 border', selectedNode && selectedNode.id === node.id ? 'bg-blue-600/20 border-blue-500/50' : 'bg-slate-800/50 border-transparent hover:bg-slate-800 hover:border-slate-600']">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-medium text-lg">{{ node.name }}</h3>
                            <p class="text-slate-400 text-sm font-mono truncate" :title="node.url">{{ node.url }}</p>
                        </div>
                        <button @click.stop="deleteNode(node.id)" class="text-red-400 hover:text-red-300 p-1">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="col-span-2 glass-card p-6 h-[calc(100vh-120px)] flex flex-col">
                <div v-if="!selectedNode" class="flex-1 flex items-center justify-center text-slate-500">
                    <div class="text-center">
                        <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        <p>Select a server to view traffic statistics</p>
                    </div>
                </div>
                <div v-else class="flex-1 flex flex-col">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                        {{ selectedNode.name }}
                        <span class="text-sm font-normal px-2 py-1 bg-slate-800 rounded text-slate-400 font-mono truncate max-w-xs block" :title="selectedNode.url">{{ selectedNode.url }}</span>
                    </h2>
                    
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-slate-800/50 border border-slate-700/50 p-4 rounded-xl">
                            <p class="text-slate-400 text-sm mb-1">Total Received Today</p>
                            <p class="text-2xl font-bold text-emerald-400">{{ formatBytes(todayRx) }}</p>
                        </div>
                        <div class="bg-slate-800/50 border border-slate-700/50 p-4 rounded-xl">
                            <p class="text-slate-400 text-sm mb-1">Total Transmitted Today</p>
                            <p class="text-2xl font-bold text-blue-400">{{ formatBytes(todayTx) }}</p>
                        </div>
                    </div>

                    <div class="flex-1 relative min-h-[300px]">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Node Modal -->
        <div v-if="showAddModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="glass-card p-6 w-full max-w-md border border-slate-600">
                <h3 class="text-xl font-bold mb-4">Add New Server</h3>
                <form @submit.prevent="addNode">
                    <div class="mb-4">
                        <label class="block text-sm text-slate-400 mb-1">Name / Label</label>
                        <input v-model="newNode.name" required type="text" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm text-slate-400 mb-1">Prometheus URL</label>
                        <input v-model="newNode.url" required type="url" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500" placeholder="https://server.com/metrics">
                    </div>
                    <div class="flex justify-end gap-3">
                        <button type="button" @click="showAddModal = false" class="px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-800 transition">Cancel</button>
                        <button type="submit" class="btn-primary px-4 py-2 rounded-lg font-medium text-white">Save Server</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    nodes: [],
                    selectedNode: null,
                    showAddModal: false,
                    newNode: { name: '', url: '' },
                    chartInstance: null,
                    trafficData: [],
                }
            },
            computed: {
                todayRx() {
                    if (!this.trafficData || this.trafficData.length === 0) return 0;
                    return this.trafficData[this.trafficData.length - 1].rx_bytes || 0;
                },
                todayTx() {
                    if (!this.trafficData || this.trafficData.length === 0) return 0;
                    return this.trafficData[this.trafficData.length - 1].tx_bytes || 0;
                }
            },
            mounted() {
                this.fetchNodes()
            },
            methods: {
                formatBytes(bytes, decimals = 2) {
                    if (!+bytes) return '0 Bytes'
                    const k = 1024
                    const dm = decimals < 0 ? 0 : decimals
                    const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB']
                    const i = Math.floor(Math.log(bytes) / Math.log(k))
                    return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`
                },
                async fetchNodes() {
                    try {
                        const res = await fetch('/api/nodes')
                        this.nodes = await res.json() || []
                    } catch (e) {
                        console.error('Error fetching nodes:', e)
                    }
                },
                async addNode() {
                    this.newNode.port = parseInt(this.newNode.port)
                    try {
                        await fetch('/api/nodes', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.newNode)
                        })
                        this.showAddModal = false
                        this.newNode = { name: '', url: '' }
                        this.fetchNodes()
                    } catch (e) {
                        alert('Failed to add node: ' + e.message)
                    }
                },
                async deleteNode(id) {
                    if (!confirm('Are you sure you want to delete this server? All traffic history will be lost.')) return
                    try {
                        await fetch(`/api/nodes/${id}`, { method: 'DELETE' })
                        if (this.selectedNode && this.selectedNode.id === id) {
                            this.selectedNode = null
                        }
                        this.fetchNodes()
                    } catch (e) {
                        alert('Failed to delete node')
                    }
                },
                async selectNode(node) {
                    this.selectedNode = node
                    this.trafficData = []
                    await this.fetchTraffic()
                },
                async fetchTraffic() {
                    if (!this.selectedNode) return
                    try {
                        const res = await fetch(`/api/nodes/${this.selectedNode.id}/traffic`)
                        this.trafficData = await res.json() || []
                        this.renderChart()
                    } catch (e) {
                        console.error('Failed to fetch traffic:', e)
                    }
                },
                renderChart() {
                    const ctx = document.getElementById('trafficChart')
                    if (!ctx) return

                    if (this.chartInstance) {
                        this.chartInstance.destroy()
                    }

                    const labels = this.trafficData.map(d => d.date)
                    const rxData = this.trafficData.map(d => d.rx_bytes / (1024 * 1024)) // Convert to MB
                    const txData = this.trafficData.map(d => d.tx_bytes / (1024 * 1024))

                    this.chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: 'Download (MB)',
                                    data: rxData,
                                    borderColor: '#10b981', // emerald-500
                                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                    borderWidth: 2,
                                    fill: true,
                                    tension: 0.4
                                },
                                {
                                    label: 'Upload (MB)',
                                    data: txData,
                                    borderColor: '#3b82f6', // blue-500
                                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                    borderWidth: 2,
                                    fill: true,
                                    tension: 0.4
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    labels: { color: '#cbd5e1' }
                                },
                                tooltip: {
                                    mode: 'index',
                                    intersect: false,
                                    callbacks: {
                                        label: function(context) {
                                            let label = context.dataset.label || '';
                                            if (label) {
                                                label += ': ';
                                            }
                                            if (context.parsed.y !== null) {
                                                if (context.parsed.y > 1024) {
                                                    label += (context.parsed.y / 1024).toFixed(2) + ' GB';
                                                } else {
                                                    label += context.parsed.y.toFixed(2) + ' MB';
                                                }
                                            }
                                            return label;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                    ticks: { color: '#94a3b8' }
                                },
                                y: {
                                    grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                    ticks: { 
                                        color: '#94a3b8',
                                        callback: function(value) {
                                            if (value >= 1024) return (value / 1024).toFixed(1) + ' GB'
                                            return value + ' MB'
                                        }
                                    }
                                }
                            },
                            interaction: {
                                mode: 'nearest',
                                axis: 'x',
                                intersect: false
                            }
                        }
                    })
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
