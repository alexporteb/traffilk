<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffilk Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        kuma: {
                            bg: '#090c10', // Body bg from Uptime Kuma Dark
                            card: '#0d1117', // $dark-bg
                            cardHover: '#070a10', // $dark-bg2
                            header: '#161b22', // $dark-header-bg
                            border: '#1d2634', // $dark-border-color
                            primary: '#5cdd8b', // $primary
                            highlight: '#7ce8a4', // $highlight
                            danger: '#dc3545', // $danger
                            text: '#b1b8c0', // $dark-font-color
                            textDark: '#020b05' // $dark-font-color2
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #090c10; 
            color: #b1b8c0; 
            font-family: "Twemoji Country Flags", BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; 
        }
        
        .shadow-box {
            background-color: #0d1117;
            border: 1px solid #1d2634;
            border-radius: 10px;
            box-shadow: 0 15px 70px rgba(0, 0, 0, 0.1);
            padding: 10px;
        }
        
        .shadow-box.big-padding {
            padding: 20px;
        }

        /* Custom Scrollbar - Uptime Kuma style */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1d2634; border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        .status-pill {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .status-up { background-color: #5cdd8b; box-shadow: 0 0 8px rgba(92, 221, 139, 0.4); }
        .status-down { background-color: #dc3545; box-shadow: 0 0 8px rgba(220, 53, 69, 0.4); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.375rem 20px; border-radius: 25px; font-weight: normal;
            transition: all 0.2s; cursor: pointer; border: 1px solid transparent;
        }
        .btn-primary { background-color: #5cdd8b; color: #020b05; border-color: #5cdd8b; }
        .btn-primary:hover { background-color: #7ce8a4; border-color: #7ce8a4; color: #020b05; }
        
        .btn-normal { background-color: #161b22; color: #b1b8c0; border-color: #161b22; }
        .btn-normal:hover { background-color: #0f1218; border-color: #0f1218; color: #b1b8c0; }

        .btn-danger { background-color: transparent; color: #dc3545; border-color: #dc3545; }
        .btn-danger:hover { background-color: #dc3545; color: white; }
        
        .form-control {
            background-color: #070a10;
            border: 1px solid #1d2634;
            color: #b1b8c0;
            border-radius: 0.375rem;
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #5cdd8b;
            box-shadow: 0 0 0 0.25rem rgba(92, 221, 139, 0.25);
        }

        .monitor-list-item {
            display: block;
            text-decoration: none;
            padding: 13px 15px 10px 15px;
            border-radius: 10px;
            transition: all ease-in-out 0.15s;
            cursor: pointer;
        }
        .monitor-list-item:hover {
            background-color: #070a10;
        }
        .monitor-list-item.active {
            background-color: #070a10;
            border-left: 4px solid #5cdd8b;
        }
    </style>
</head>
<body>
    <div id="app" class="flex h-screen w-full">
        
        <!-- Sidebar -->
        <aside class="w-80 border-r border-kuma-border bg-kuma-bg flex flex-col z-10">
            <!-- Header -->
            <div class="p-4 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <img src="https://raw.githubusercontent.com/louislam/uptime-kuma/master/public/icon.svg" class="w-8 h-8 rounded" alt="Logo" onerror="this.style.display='none'">
                    <h1 class="text-xl font-bold tracking-wide text-white">Traffilk</h1>
                </div>
                <button @click="logout" title="Logout" class="text-kuma-text hover:text-white transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
            
            <!-- Controls -->
            <div class="px-4 pb-3 space-y-3">
                <button @click="showAddModal = true" class="btn btn-primary w-full shadow-box flex gap-2 justify-center">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add New Monitor
                </button>
                <div class="relative">
                    <svg class="w-4 h-4 absolute left-3 top-3 text-kuma-text" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" v-model="searchQuery" placeholder="Search..." class="form-control w-full pl-9 pr-3 py-2 text-sm">
                </div>
            </div>

            <!-- Node List -->
            <div class="flex-1 overflow-y-auto px-2">
                <div v-if="filteredNodes.length === 0" class="p-4 text-center text-kuma-text text-sm">
                    No monitors found.
                </div>
                <div v-for="node in filteredNodes" :key="node.id" 
                     @click="selectNode(node)"
                     :class="['monitor-list-item flex items-center justify-between group mb-1', selectedNode && selectedNode.id === node.id ? 'active' : '']">
                    
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="status-pill status-up"></div>
                        <div class="truncate">
                            <div class="text-sm text-white truncate">{{ node.name }}</div>
                            <div class="text-xs text-kuma-text truncate">{{ node.url }}</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col bg-kuma-bg overflow-hidden relative">
            <div v-if="!selectedNode" class="flex-1 flex items-center justify-center text-kuma-text">
                <div class="text-center shadow-box big-padding">
                    <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <p class="text-lg">Select a monitor from the sidebar</p>
                </div>
            </div>
            
            <div v-else class="flex-1 overflow-y-auto p-6 md:p-10">
                <!-- Page Header -->
                <div class="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-8">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <h2 class="text-3xl font-bold text-white">{{ selectedNode.name }}</h2>
                        </div>
                        <a :href="selectedNode.url" target="_blank" class="text-kuma-primary hover:text-kuma-highlight text-sm flex items-center gap-1 w-fit transition">
                            {{ selectedNode.url }}
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <button @click="deleteNode(selectedNode.id)" class="btn btn-danger text-sm">
                            Delete
                        </button>
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div class="shadow-box big-padding flex items-center gap-5">
                        <div>
                            <p class="text-kuma-text text-sm mb-1">Total Received Today</p>
                            <p class="text-2xl font-bold text-kuma-primary">{{ formatBytes(todayRx) }}</p>
                        </div>
                    </div>
                    <div class="shadow-box big-padding flex items-center gap-5">
                        <div>
                            <p class="text-kuma-text text-sm mb-1">Total Transmitted Today</p>
                            <p class="text-2xl font-bold text-blue-400">{{ formatBytes(todayTx) }}</p>
                        </div>
                    </div>
                </div>

                <!-- Chart Card -->
                <div class="shadow-box big-padding">
                    <h3 class="text-lg font-semibold mb-6 flex items-center gap-2 text-white">
                        Traffic History (Last 30 Days)
                    </h3>
                    <div class="w-full h-80 relative">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>
            </div>
        </main>

        <!-- Add Node Modal -->
        <div v-if="showAddModal" class="fixed inset-0 bg-black/50 backdrop-blur-[3px] flex items-center justify-center z-50 p-4">
            <div class="shadow-box big-padding w-full max-w-md transform transition-all">
                <div class="flex justify-between items-center mb-5 border-b border-kuma-border pb-3">
                    <h3 class="text-xl font-bold text-white">Add New Monitor</h3>
                    <button @click="showAddModal = false" class="text-kuma-text hover:text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div>
                    <form @submit.prevent="addNode">
                        <div class="mb-4">
                            <label class="block text-sm text-kuma-text mb-1.5">Friendly Name</label>
                            <input v-model="newNode.name" required type="text" class="form-control w-full px-3 py-2" placeholder="e.g. Web Server">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm text-kuma-text mb-1.5">Prometheus URL</label>
                            <input v-model="newNode.url" required type="url" class="form-control w-full px-3 py-2" placeholder="https://server.com/metrics">
                        </div>
                        <div class="flex justify-end gap-3 pt-2">
                            <button type="button" @click="showAddModal = false" class="btn btn-normal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    nodes: [],
                    searchQuery: '',
                    selectedNode: null,
                    showAddModal: false,
                    newNode: { name: '', url: '' },
                    chartInstance: null,
                    trafficData: [],
                }
            },
            computed: {
                filteredNodes() {
                    if (!this.searchQuery) return this.nodes;
                    const q = this.searchQuery.toLowerCase();
                    return this.nodes.filter(n => n.name.toLowerCase().includes(q) || n.url.toLowerCase().includes(q));
                },
                todayRx() {
                    if (!this.trafficData || this.trafficData.length === 0) return 0;
                    return this.trafficData[this.trafficData.length - 1].rx_bytes || 0;
                },
                todayTx() {
                    if (!this.trafficData || this.trafficData.length === 0) return 0;
                    return this.trafficData[this.trafficData.length - 1].tx_bytes || 0;
                }
            },
            mounted() {
                this.fetchNodes()
            },
            methods: {
                formatBytes(bytes, decimals = 2) {
                    if (!+bytes) return '0 Bytes'
                    const k = 1024
                    const dm = decimals < 0 ? 0 : decimals
                    const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB']
                    const i = Math.floor(Math.log(bytes) / Math.log(k))
                    return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`
                },
                async fetchNodes() {
                    try {
                        const res = await fetch('../api/nodes')
                        if (res.status === 401) {
                            window.location.href = '../login'
                            return
                        }
                        this.nodes = await res.json() || []
                        if (this.nodes.length > 0 && !this.selectedNode) {
                            this.selectNode(this.nodes[0])
                        }
                    } catch (e) {
                        console.error('Error fetching nodes:', e)
                    }
                },
                async addNode() {
                    try {
                        const res = await fetch('../api/nodes', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.newNode)
                        })
                        if (res.status === 401) { window.location.href = '../login'; return; }
                        
                        this.showAddModal = false
                        this.newNode = { name: '', url: '' }
                        await this.fetchNodes()
                    } catch (e) {
                        alert('Failed to add node: ' + e.message)
                    }
                },
                async deleteNode(id) {
                    if (!confirm('Are you sure you want to delete this node? All history will be lost.')) return
                    try {
                        const res = await fetch(`../api/nodes/${id}`, { method: 'DELETE' })
                        if (res.status === 401) { window.location.href = '../login'; return; }
                        
                        if (this.selectedNode && this.selectedNode.id === id) {
                            this.selectedNode = null
                            this.trafficData = []
                        }
                        await this.fetchNodes()
                    } catch (e) {
                        alert('Failed to delete node')
                    }
                },
                async selectNode(node) {
                    this.selectedNode = node
                    this.trafficData = []
                    await this.fetchTraffic()
                },
                async fetchTraffic() {
                    if (!this.selectedNode) return
                    try {
                        const res = await fetch(`../api/nodes/${this.selectedNode.id}/traffic`)
                        if (res.status === 401) { window.location.href = '../login'; return; }
                        this.trafficData = await res.json() || []
                        this.renderChart()
                    } catch (e) {
                        console.error('Failed to fetch traffic:', e)
                    }
                },
                async logout() {
                    try {
                        await fetch('../api/logout', { method: 'POST' })
                        window.location.href = '../login'
                    } catch (e) {
                        window.location.href = '../login'
                    }
                },
                renderChart() {
                    const ctx = document.getElementById('trafficChart')
                    if (!ctx) return

                    if (this.chartInstance) {
                        this.chartInstance.destroy()
                    }

                    const labels = this.trafficData.map(d => d.date)
                    const rxData = this.trafficData.map(d => d.rx_bytes / (1024 * 1024)) // Convert to MB
                    const txData = this.trafficData.map(d => d.tx_bytes / (1024 * 1024))

                    this.chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: 'Download (MB)',
                                    data: rxData,
                                    borderColor: '#5cdd8b',
                                    backgroundColor: 'rgba(92, 221, 139, 0.1)',
                                    borderWidth: 2,
                                    fill: true,
                                    tension: 0.4,
                                    pointRadius: 3,
                                    pointBackgroundColor: '#5cdd8b'
                                },
                                {
                                    label: 'Upload (MB)',
                                    data: txData,
                                    borderColor: '#3b82f6',
                                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                    borderWidth: 2,
                                    fill: true,
                                    tension: 0.4,
                                    pointRadius: 3,
                                    pointBackgroundColor: '#3b82f6'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'top',
                                    align: 'end',
                                    labels: { color: '#b1b8c0', boxWidth: 12, padding: 20 }
                                },
                                tooltip: {
                                    mode: 'index',
                                    intersect: false,
                                    backgroundColor: '#0d1117',
                                    titleColor: '#ffffff',
                                    bodyColor: '#b1b8c0',
                                    borderColor: '#1d2634',
                                    borderWidth: 1,
                                    padding: 12,
                                    callbacks: {
                                        label: function(context) {
                                            let label = context.dataset.label || '';
                                            if (label) label += ': ';
                                            if (context.parsed.y !== null) {
                                                if (context.parsed.y > 1024) {
                                                    label += (context.parsed.y / 1024).toFixed(2) + ' GB';
                                                } else {
                                                    label += context.parsed.y.toFixed(2) + ' MB';
                                                }
                                            }
                                            return label;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    grid: { color: '#1d2634', drawBorder: false },
                                    ticks: { color: '#b1b8c0', maxRotation: 45, minRotation: 45 }
                                },
                                y: {
                                    grid: { color: '#1d2634', drawBorder: false },
                                    ticks: { 
                                        color: '#b1b8c0',
                                        callback: function(value) {
                                            if (value >= 1024) return (value / 1024).toFixed(1) + ' GB'
                                            return value + ' MB'
                                        }
                                    }
                                }
                            },
                            interaction: {
                                mode: 'nearest',
                                axis: 'x',
                                intersect: false
                            }
                        }
                    })
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
