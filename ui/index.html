<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffilk Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        kuma: {
                            bg: '#0B1120',
                            card: '#1E293B',
                            primary: '#5865F2', // Soft blue
                            success: '#50C878', // Emerald green
                            danger: '#DC2626',
                            border: '#334155',
                            text: '#F8FAFC',
                            textMuted: '#94A3B8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B1120; color: #F8FAFC; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
        
        .kuma-card {
            background-color: #1E293B;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748B; }

        .status-pill {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .status-up { background-color: #50C878; box-shadow: 0 0 8px rgba(80, 200, 120, 0.4); }
        .status-down { background-color: #DC2626; box-shadow: 0 0 8px rgba(220, 38, 38, 0.4); }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 500;
            transition: all 0.2s; cursor: pointer; border: 1px solid transparent;
        }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-primary:hover { background-color: #2563eb; }
        .btn-danger { background-color: transparent; color: #ef4444; border-color: #ef4444; }
        .btn-danger:hover { background-color: rgba(239, 68, 68, 0.1); }
        .btn-outline { background-color: transparent; border-color: #475569; color: #cbd5e1; }
        .btn-outline:hover { background-color: #334155; }
    </style>
</head>
<body>
    <div id="app" class="flex h-screen w-full">
        
        <!-- Sidebar -->
        <aside class="w-80 border-r border-kuma-border bg-kuma-bg flex flex-col z-10 shadow-lg">
            <!-- Header -->
            <div class="p-4 border-b border-kuma-border flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg">T</div>
                    <h1 class="text-xl font-bold tracking-wide">Traffilk</h1>
                </div>
                <button @click="logout" title="Logout" class="text-kuma-textMuted hover:text-white transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>
            
            <!-- Controls -->
            <div class="p-4 space-y-3 border-b border-kuma-border">
                <button @click="showAddModal = true" class="btn btn-primary w-full shadow flex gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add New Node
                </button>
                <div class="relative">
                    <svg class="w-4 h-4 absolute left-3 top-3 text-kuma-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" v-model="searchQuery" placeholder="Search..." class="w-full bg-kuma-card border border-kuma-border rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:border-blue-500 transition">
                </div>
            </div>

            <!-- Node List -->
            <div class="flex-1 overflow-y-auto">
                <div v-if="filteredNodes.length === 0" class="p-6 text-center text-kuma-textMuted text-sm">
                    No nodes found.
                </div>
                <div v-for="node in filteredNodes" :key="node.id" 
                     @click="selectNode(node)"
                     :class="['px-4 py-3 cursor-pointer border-l-4 transition-colors flex items-center justify-between group', 
                              selectedNode && selectedNode.id === node.id ? 'border-blue-500 bg-kuma-card' : 'border-transparent hover:bg-slate-800/50']">
                    
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="status-pill status-up"></div>
                        <div class="truncate">
                            <div class="font-medium text-sm text-white truncate">{{ node.name }}</div>
                            <div class="text-xs text-kuma-textMuted truncate mt-0.5">{{ node.url }}</div>
                        </div>
                    </div>
                    <!-- Right chevron -->
                    <svg class="w-4 h-4 text-kuma-textMuted opacity-0 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col bg-[#050B14] overflow-hidden relative">
            <div v-if="!selectedNode" class="flex-1 flex items-center justify-center text-kuma-textMuted">
                <div class="text-center">
                    <svg class="w-20 h-20 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <p class="text-lg">Select a node from the sidebar</p>
                </div>
            </div>
            
            <div v-else class="flex-1 overflow-y-auto p-6 md:p-10">
                <!-- Page Header -->
                <div class="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-8">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <div class="status-pill status-up" style="width: 14px; height: 14px;"></div>
                            <h2 class="text-3xl font-bold text-white">{{ selectedNode.name }}</h2>
                        </div>
                        <a :href="selectedNode.url" target="_blank" class="text-blue-400 hover:text-blue-300 text-sm flex items-center gap-1 w-fit">
                            {{ selectedNode.url }}
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <button @click="deleteNode(selectedNode.id)" class="btn btn-danger text-sm">
                            Delete Node
                        </button>
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="kuma-card p-6 flex items-center gap-5">
                        <div class="w-12 h-12 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </div>
                        <div>
                            <p class="text-kuma-textMuted text-sm font-medium mb-1">Total Received Today</p>
                            <p class="text-2xl font-bold text-white">{{ formatBytes(todayRx) }}</p>
                        </div>
                    </div>
                    <div class="kuma-card p-6 flex items-center gap-5">
                        <div class="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        </div>
                        <div>
                            <p class="text-kuma-textMuted text-sm font-medium mb-1">Total Transmitted Today</p>
                            <p class="text-2xl font-bold text-white">{{ formatBytes(todayTx) }}</p>
                        </div>
                    </div>
                </div>

                <!-- Chart Card -->
                <div class="kuma-card p-6">
                    <h3 class="text-lg font-semibold mb-6 flex items-center gap-2">
                        <svg class="w-5 h-5 text-kuma-textMuted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                        Traffic History (Last 30 Days)
                    </h3>
                    <div class="w-full h-80 relative">
                        <canvas id="trafficChart"></canvas>
                    </div>
                </div>
            </div>
        </main>

        <!-- Add Node Modal -->
        <div v-if="showAddModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div class="kuma-card w-full max-w-md shadow-2xl transform transition-all">
                <div class="flex justify-between items-center p-5 border-b border-kuma-border">
                    <h3 class="text-lg font-bold">Add New Node</h3>
                    <button @click="showAddModal = false" class="text-kuma-textMuted hover:text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="p-6">
                    <form @submit.prevent="addNode">
                        <div class="mb-5">
                            <label class="block text-sm font-medium text-kuma-textMuted mb-1.5">Friendly Name</label>
                            <input v-model="newNode.name" required type="text" class="w-full bg-[#0F172A] border border-kuma-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" placeholder="e.g. Web Server">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-kuma-textMuted mb-1.5">Prometheus URL</label>
                            <input v-model="newNode.url" required type="url" class="w-full bg-[#0F172A] border border-kuma-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" placeholder="https://server.com/metrics">
                        </div>
                        <div class="flex justify-end gap-3">
                            <button type="button" @click="showAddModal = false" class="btn btn-outline">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Node</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    nodes: [],
                    searchQuery: '',
                    selectedNode: null,
                    showAddModal: false,
                    newNode: { name: '', url: '' },
                    chartInstance: null,
                    trafficData: [],
                }
            },
            computed: {
                filteredNodes() {
                    if (!this.searchQuery) return this.nodes;
                    const q = this.searchQuery.toLowerCase();
                    return this.nodes.filter(n => n.name.toLowerCase().includes(q) || n.url.toLowerCase().includes(q));
                },
                todayRx() {
                    if (!this.trafficData || this.trafficData.length === 0) return 0;
                    return this.trafficData[this.trafficData.length - 1].rx_bytes || 0;
                },
                todayTx() {
                    if (!this.trafficData || this.trafficData.length === 0) return 0;
                    return this.trafficData[this.trafficData.length - 1].tx_bytes || 0;
                }
            },
            mounted() {
                this.fetchNodes()
            },
            methods: {
                formatBytes(bytes, decimals = 2) {
                    if (!+bytes) return '0 Bytes'
                    const k = 1024
                    const dm = decimals < 0 ? 0 : decimals
                    const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB']
                    const i = Math.floor(Math.log(bytes) / Math.log(k))
                    return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`
                },
                async fetchNodes() {
                    try {
                        const res = await fetch('../api/nodes')
                        if (res.status === 401) {
                            window.location.href = '../login'
                            return
                        }
                        this.nodes = await res.json() || []
                        if (this.nodes.length > 0 && !this.selectedNode) {
                            this.selectNode(this.nodes[0])
                        }
                    } catch (e) {
                        console.error('Error fetching nodes:', e)
                    }
                },
                async addNode() {
                    try {
                        const res = await fetch('../api/nodes', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.newNode)
                        })
                        if (res.status === 401) { window.location.href = '../login'; return; }
                        
                        this.showAddModal = false
                        this.newNode = { name: '', url: '' }
                        await this.fetchNodes()
                    } catch (e) {
                        alert('Failed to add node: ' + e.message)
                    }
                },
                async deleteNode(id) {
                    if (!confirm('Are you sure you want to delete this node? All history will be lost.')) return
                    try {
                        const res = await fetch(`../api/nodes/${id}`, { method: 'DELETE' })
                        if (res.status === 401) { window.location.href = '../login'; return; }
                        
                        if (this.selectedNode && this.selectedNode.id === id) {
                            this.selectedNode = null
                            this.trafficData = []
                        }
                        await this.fetchNodes()
                    } catch (e) {
                        alert('Failed to delete node')
                    }
                },
                async selectNode(node) {
                    this.selectedNode = node
                    this.trafficData = []
                    await this.fetchTraffic()
                },
                async fetchTraffic() {
                    if (!this.selectedNode) return
                    try {
                        const res = await fetch(`../api/nodes/${this.selectedNode.id}/traffic`)
                        if (res.status === 401) { window.location.href = '../login'; return; }
                        this.trafficData = await res.json() || []
                        this.renderChart()
                    } catch (e) {
                        console.error('Failed to fetch traffic:', e)
                    }
                },
                async logout() {
                    try {
                        await fetch('../api/logout', { method: 'POST' })
                        window.location.href = '../login'
                    } catch (e) {
                        window.location.href = '../login'
                    }
                },
                renderChart() {
                    const ctx = document.getElementById('trafficChart')
                    if (!ctx) return

                    if (this.chartInstance) {
                        this.chartInstance.destroy()
                    }

                    const labels = this.trafficData.map(d => d.date)
                    const rxData = this.trafficData.map(d => d.rx_bytes / (1024 * 1024)) // Convert to MB
                    const txData = this.trafficData.map(d => d.tx_bytes / (1024 * 1024))

                    this.chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                {
                                    label: 'Download (MB)',
                                    data: rxData,
                                    borderColor: '#50C878',
                                    backgroundColor: 'rgba(80, 200, 120, 0.1)',
                                    borderWidth: 2,
                                    fill: true,
                                    tension: 0.4,
                                    pointRadius: 3,
                                    pointBackgroundColor: '#50C878'
                                },
                                {
                                    label: 'Upload (MB)',
                                    data: txData,
                                    borderColor: '#5865F2',
                                    backgroundColor: 'rgba(88, 101, 242, 0.1)',
                                    borderWidth: 2,
                                    fill: true,
                                    tension: 0.4,
                                    pointRadius: 3,
                                    pointBackgroundColor: '#5865F2'
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'top',
                                    align: 'end',
                                    labels: { color: '#94A3B8', boxWidth: 12, padding: 20 }
                                },
                                tooltip: {
                                    mode: 'index',
                                    intersect: false,
                                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                                    titleColor: '#F8FAFC',
                                    bodyColor: '#cbd5e1',
                                    borderColor: '#334155',
                                    borderWidth: 1,
                                    padding: 12,
                                    callbacks: {
                                        label: function(context) {
                                            let label = context.dataset.label || '';
                                            if (label) label += ': ';
                                            if (context.parsed.y !== null) {
                                                if (context.parsed.y > 1024) {
                                                    label += (context.parsed.y / 1024).toFixed(2) + ' GB';
                                                } else {
                                                    label += context.parsed.y.toFixed(2) + ' MB';
                                                }
                                            }
                                            return label;
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    grid: { color: '#1E293B', drawBorder: false },
                                    ticks: { color: '#64748B', maxRotation: 45, minRotation: 45 }
                                },
                                y: {
                                    grid: { color: '#1E293B', drawBorder: false },
                                    ticks: { 
                                        color: '#64748B',
                                        callback: function(value) {
                                            if (value >= 1024) return (value / 1024).toFixed(1) + ' GB'
                                            return value + ' MB'
                                        }
                                    }
                                }
                            },
                            interaction: {
                                mode: 'nearest',
                                axis: 'x',
                                intersect: false
                            }
                        }
                    })
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
