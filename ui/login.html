<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Traffilk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        kuma: {
                            bg: '#090c10',
                            card: '#0d1117',
                            border: '#1d2634',
                            primary: '#5cdd8b',
                            danger: '#dc3545',
                            text: '#b1b8c0',
                            textDark: '#020b05'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #090c10; 
            color: #b1b8c0; 
            font-family: "Twemoji Country Flags", BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; 
        }
        
        .shadow-box {
            background-color: #0d1117;
            border: 1px solid #1d2634;
            border-radius: 10px;
            box-shadow: 0 15px 70px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .btn-primary { 
            background-color: #5cdd8b; 
            color: #020b05; 
            border: 1px solid #5cdd8b;
            transition: all 0.2s; 
            padding: 0.375rem 20px;
            border-radius: 25px;
        }
        .btn-primary:hover { background-color: #7ce8a4; border-color: #7ce8a4; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        
        .form-control {
            background-color: #070a10;
            border: 1px solid #1d2634;
            color: #b1b8c0;
            border-radius: 0.375rem;
            transition: all 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #5cdd8b;
            box-shadow: 0 0 0 0.25rem rgba(92, 221, 139, 0.25);
        }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-sm px-4">
        <div class="text-center mb-8">
            <img src="https://raw.githubusercontent.com/louislam/uptime-kuma/master/public/icon.svg" class="w-20 h-20 mx-auto mb-4 drop-shadow-lg" alt="Logo" onerror="this.style.display='none'">
        </div>

        <div class="shadow-box pb-8">
            <h1 class="text-2xl font-bold tracking-wide text-white text-center mb-6">Traffilk</h1>

            <div v-if="error" class="mb-4 p-3 bg-red-500/10 border border-red-500/50 rounded-lg text-red-400 text-sm text-center">
                {{ error }}
            </div>

            <form @submit.prevent="login">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-kuma-text mb-1.5">Username</label>
                    <input v-model="username" type="text" required autofocus class="form-control w-full px-3 py-2">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-kuma-text mb-1.5">Password</label>
                    <input v-model="password" type="password" required class="form-control w-full px-3 py-2">
                </div>
                
                <button type="submit" :disabled="loading" class="btn-primary w-full py-2 font-medium flex justify-center items-center gap-2">
                    <span v-if="loading" class="w-5 h-5 border-2 border-kuma-textDark/20 border-t-kuma-textDark rounded-full animate-spin"></span>
                    <span v-else>Login</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    loading: false,
                    error: ''
                }
            },
            methods: {
                async login() {
                    this.loading = true
                    this.error = ''
                    try {
                        const res = await fetch('../api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: this.username,
                                password: this.password
                            })
                        })
                        
                        if (res.ok) {
                            window.location.href = '../ui/'
                        } else {
                            const data = await res.json()
                            this.error = data.error || 'Invalid credentials'
                        }
                    } catch (e) {
                        this.error = 'Network error. Please try again.'
                    } finally {
                        this.loading = false
                    }
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
