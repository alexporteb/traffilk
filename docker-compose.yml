services:
  traffilk:
    image: ghcr.io/alexporteb/traffilk:latest
    container_name: traffilk
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=UTC
      - ADMIN_USER=admin
      - ADMIN_PASS=changeme_secure_password
    networks:
      - remnawave-network

networks:
  remnawave-network:
    external: true
